<svg xmlns="http://www.w3.org/2000/svg" width="940" height="350" viewBox="0 0 940 350" preserveAspectRatio="xMidYMid slice">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&amp;display=swap');
            text { font-family: 'Prompt', sans-serif; }
            .line-flow { 
                stroke: #cbd5e1; 
                stroke-width: 3; 
                stroke-dasharray: 6 6; 
                animation: flow 20s linear infinite; 
            }
            @keyframes flow {
                to { stroke-dashoffset: -100; }
            }
        </style>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc" />
            <stop offset="100%" stop-color="#f1f5f9" />
        </linearGradient>
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.08" />
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bgGrad)" />

    <!-- Title & Philosophy (Centered) -->
    <text x="470" y="50" font-size="28" font-weight="700" fill="#0f172a" text-anchor="middle" letter-spacing="1">ZERO-WASTE AI ARCHITECTURE</text>
    <text x="470" y="75" font-size="14" fill="#64748b" text-anchor="middle">Knowledge is not a static state, but a continuous process of arising and ceasing.</text>

    <!-- ================= PIPELINE FLOW LINES ================= -->
    <line x1="140" y1="180" x2="800" y2="180" class="line-flow" />

    <!-- Flow Direction Arrows & Labels -->
    <g transform="translate(250, 180)">
        <polygon points="-5,-5 5,0 -5,5" fill="#94a3b8"/>
        <rect x="-40" y="-35" width="80" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="-21" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Raw Data</text>
    </g>

    <g transform="translate(470, 180)">
        <polygon points="-5,-5 5,0 -5,5" fill="#94a3b8"/>
        <rect x="-45" y="-35" width="90" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="-21" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">Sanitized (S1)</text>
    </g>

    <g transform="translate(690, 180)">
        <polygon points="-5,-5 5,0 -5,5" fill="#94a3b8"/>
        <rect x="-45" y="-35" width="90" height="20" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="0" y="-21" font-size="11" font-weight="600" fill="#475569" text-anchor="middle">RAG / Context</text>
    </g>

    <!-- ================= NODES (Linear Layout) ================= -->

    <!-- Node 4: Edge Scrapers -->
    <g transform="translate(140, 180)">
        <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="white" stroke="#10b981" stroke-width="4" filter="url(#drop-shadow)"/>
        <circle cx="-12" cy="10" r="4" fill="#10b981"/>
        <circle cx="12" cy="10" r="4" fill="#10b981"/>
        <circle cx="0" cy="-10" r="6" fill="none" stroke="#10b981" stroke-width="3"/>
        <path d="M -12 6 L -4 -4 M 12 6 L 4 -4" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
        
        <text x="0" y="-65" font-size="12" font-weight="700" fill="#10b981" text-anchor="middle">1. INGEST</text>
        <text x="0" y="75" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">NODE 4: SWARM</text>
        <text x="0" y="95" font-size="12" fill="#64748b" text-anchor="middle">Edge Scrapers</text>
    </g>

    <!-- Node 3: Active Gateway Router -->
    <g transform="translate(360, 180)">
        <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="white" stroke="#f59e0b" stroke-width="4" filter="url(#drop-shadow)"/>
        <path d="M -16 -12 L 16 -12 L 6 8 L -6 8 Z" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linejoin="round"/>
        <line x1="0" y1="8" x2="0" y2="18" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
        
        <text x="0" y="-65" font-size="12" font-weight="700" fill="#f59e0b" text-anchor="middle">2. FILTER</text>
        <text x="0" y="75" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">NODE 3: GATEWAY</text>
        <text x="0" y="95" font-size="12" fill="#64748b" text-anchor="middle">Hybrid Router</text>
    </g>

    <!-- Node 2: Data Lake -->
    <g transform="translate(580, 180)">
        <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="white" stroke="#3b82f6" stroke-width="4" filter="url(#drop-shadow)"/>
        <ellipse cx="0" cy="-10" rx="14" ry="5" fill="none" stroke="#3b82f6" stroke-width="3"/>
        <path d="M -14 -10 L -14 10 A 14 5 0 0 0 14 10 L 14 -10" fill="none" stroke="#3b82f6" stroke-width="3"/>
        <path d="M -14 0 A 14 5 0 0 0 14 0" fill="none" stroke="#3b82f6" stroke-width="3"/>
        
        <text x="0" y="-65" font-size="12" font-weight="700" fill="#3b82f6" text-anchor="middle">3. STORE</text>
        <text x="0" y="75" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">NODE 2: LAKE</text>
        <text x="0" y="95" font-size="12" fill="#64748b" text-anchor="middle">Vector Fabric</text>
    </g>

    <!-- Node 1: The Brain -->
    <g transform="translate(800, 180)">
        <polygon points="0,-50 43.3,-25 43.3,25 0,50 -43.3,25 -43.3,-25" fill="white" stroke="#8b5cf6" stroke-width="4" filter="url(#drop-shadow)"/>
        <rect x="-14" y="-14" width="28" height="28" rx="4" fill="none" stroke="#8b5cf6" stroke-width="3"/>
        <circle cx="0" cy="0" r="4" fill="#8b5cf6"/>
        <path d="M -14 -5 L -22 -5 M -14 5 L -22 5 M 14 -5 L 22 -5 M 14 5 L 22 5 M -5 -14 L -5 -22 M 5 -14 L 5 -22 M -5 14 L -5 22 M 5 14 L 5 22" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
        
        <text x="0" y="-65" font-size="12" font-weight="700" fill="#8b5cf6" text-anchor="middle">4. COMPUTE</text>
        <text x="0" y="75" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">NODE 1: BRAIN</text>
        <text x="0" y="95" font-size="12" fill="#64748b" text-anchor="middle">Neural Core</text>
    </g>
</svg>