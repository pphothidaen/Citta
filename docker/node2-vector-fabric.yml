services:
  redis-broker:
    image: redis:7-alpine
    container_name: citta_redis_node2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_AUTH:-change-me}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: citta_qdrant_node2
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped

  watchdog:
    image: louislam/uptime-kuma:1
    container_name: citta_watchdog_node2
    ports:
      - "3001:3001"
    volumes:
      - watchdog_data:/app/data
    restart: unless-stopped

volumes:
  redis_data:
  qdrant_data:
  watchdog_data:

networks:
  default:
    name: citta_node2_net
