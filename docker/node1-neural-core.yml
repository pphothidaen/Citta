services:
  ollama:
    image: ollama/ollama:latest
    container_name: citta_ollama_node1
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  gateway-proxy:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: citta_proxy_node1
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      CITTA_SERVICE_NAME: gateway-proxy
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - proxy_logs:/app/logs
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  proxy_logs:

networks:
  default:
    name: citta_node1_net
