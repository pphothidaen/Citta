services:
  ollama:
    image: ollama/ollama:latest
    container_name: citta_ollama_local
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  gateway-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: citta_proxy_local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CITTA_SERVICE_NAME: gateway-proxy
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    restart: unless-stopped
    volumes:
      - proxy_logs:/app/logs
    depends_on:
      - ollama

volumes:
  ollama_data:
  proxy_logs:
