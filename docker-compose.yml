# docker-compose.yml - Citta POC with external drive volumes
version: '3.8'

services:
  gateway-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orchestrator_proxy_node1
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - /Volumes/Citta_SSD_120GB:/data/ssd1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
