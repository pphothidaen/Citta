# Citta Phase 1 — Local Simulation (Node 1)
# Tip: To shift to Node 2 later, replace 0.0.0.0 with Node 2 IP
#      and update MINIO_HOST / CHROMA_HOST in .env

version: "3.9"

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: citta-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cittaadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cittasecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: citta-chromadb
    ports:
      - "8000:8000"   # HTTP API
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/data
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  minio_data:
    driver: local
  chroma_data:
    driver: local
